general {
    lock_cmd = pgrep -x hyprlock >/dev/null || hyprlock &
    before_sleep_cmd = pgrep -x hyprlock >/dev/null || (hyprlock & sleep 2)
    after_sleep_cmd = hyprctl dispatch dpms on
}

# 15 min idle: dim screen
listener {
    timeout = 900
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# 20 min idle: lock screen
listener {
    timeout = 1200
    on-timeout = brightnessctl -r; pgrep -x hyprlock >/dev/null || hyprlock &
}

# 30 min idle: turn screen off
listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on; brightnessctl -r
}

# 60 min idle: suspend
listener {
    timeout = 3600
    on-timeout = systemctl suspend
}
